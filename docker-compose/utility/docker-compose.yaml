services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    user: "0:0"
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./dockhand_data:/app/data
      - /home/dinith/docker:/home/dinith
    restart: unless-stopped
    labels:
      - "category=utility"